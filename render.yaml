# render.yaml — Render deployment config
services:
  - type: web
    name: lead-pipeline
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: FREELANCER_NAME
        sync: false
      - key: FROM_EMAIL
        sync: false
