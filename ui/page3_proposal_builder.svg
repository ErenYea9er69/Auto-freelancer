<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
<defs>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=DM+Sans:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
text{font-family:'DM Sans',sans-serif}
.syne{font-family:'Syne',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
.t-primary{fill:#E2E2EA}.t-secondary{fill:#7A7A96}.t-muted{fill:#44445A}
.t-accent{fill:#00FFB2}.t-warm{fill:#FFC078}.t-hot{fill:#FF6B6B}.t-purple{fill:#6C5CE7}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.pulse{animation:pulse 2s ease-in-out infinite}
</style>
<linearGradient id="g1" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#07070D"/><stop offset="100%" stop-color="#0D0D1A"/>
</linearGradient>
<linearGradient id="accent-g" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00FFB2"/><stop offset="100%" stop-color="#6C5CE7"/>
</linearGradient>
<linearGradient id="card-g" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#1A1A2E"/><stop offset="100%" stop-color="#12121F"/>
</linearGradient>
<linearGradient id="btn-g" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00FFB2"/><stop offset="100%" stop-color="#00CC8E"/>
</linearGradient>
<filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity=".4"/></filter>
<filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
<filter id="glow-lg"><feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#00FFB2" flood-opacity=".15"/></filter>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40 0V40H0" fill="none" stroke="#1A1A2E" stroke-width=".5"/>
</pattern>
</defs>

<!-- BG -->
<rect width="1440" height="900" fill="url(#g1)"/>
<rect width="1440" height="900" fill="url(#grid)" opacity=".3"/>
<circle cx="720" cy="450" r="300" fill="#00FFB2" opacity=".02" filter="url(#blur1)"/>
<circle cx="400" cy="700" r="200" fill="#6C5CE7" opacity=".03" filter="url(#blur1)"/>

<!-- ═══ TOP BAR ═══ -->
<rect x="0" y="0" width="1440" height="64" fill="#0A0A14" opacity=".9"/>
<line x1="0" y1="64" x2="1440" y2="64" stroke="#1E1E32" stroke-width="1"/>
<rect x="24" y="16" width="8" height="32" rx="2" fill="#00FFB2"/>
<rect x="36" y="22" width="8" height="20" rx="2" fill="#00FFB2" opacity=".6"/>
<rect x="48" y="28" width="8" height="8" rx="2" fill="#00FFB2" opacity=".3"/>
<text x="68" y="40" class="syne t-primary" font-size="18" font-weight="800" letter-spacing="3">AUTOPILOT</text>
<circle cx="210" cy="32" r="4" fill="#00FFB2" class="pulse"/>
<text x="222" y="37" class="mono t-accent" font-size="11">SYSTEM ACTIVE</text>
<text x="340" y="38" class="t-muted" font-size="13">← Sarah Chen</text>
<text x="430" y="38" class="t-muted" font-size="13">/</text>
<text x="445" y="38" class="t-primary" font-size="13" font-weight="500">Post-Call Submission</text>
<circle cx="1370" cy="32" r="16" fill="#6C5CE7"/>
<text x="1363" y="38" fill="#fff" class="syne" font-size="14" font-weight="700">A</text>

<!-- ═══ LEFT SIDE — FORM ═══ -->
<g transform="translate(80, 100)">

<!-- Header -->
<text x="0" y="30" class="syne t-primary" font-size="28" font-weight="800">Submit Call Details</text>
<text x="0" y="56" class="t-secondary" font-size="14">Fill in 3 fields. AI generates and sends the proposal within minutes.</text>

<!-- Lead context mini-card -->
<rect x="0" y="76" width="540" height="64" rx="10" fill="#0F0F1A" stroke="#2A2A42" stroke-width="1"/>
<circle cx="32" cy="108" r="16" fill="#FF6B6B" opacity=".12"/>
<text x="24" y="114" font-size="14">🔥</text>
<text x="56" y="104" class="t-primary" font-size="14" font-weight="500">Sarah Chen</text>
<text x="160" y="104" class="t-muted" font-size="12">sarah@example.com</text>
<text x="56" y="122" class="t-secondary" font-size="11">Complete rebrand — logo, website, brand guidelines</text>
<rect x="460" y="96" width="60" height="22" rx="11" fill="#FF6B6B" opacity=".12"/>
<text x="474" y="112" class="t-hot mono" font-size="10">HOT</text>

<!-- ═══ FORM FIELDS ═══ -->

<!-- Field 1: Project Type -->
<g transform="translate(0, 170)">
<text x="0" y="0" class="t-accent mono" font-size="11" letter-spacing="1">01</text>
<text x="30" y="0" class="t-primary" font-size="14" font-weight="500">Project Type</text>
<text x="0" y="18" class="t-muted" font-size="11">What are you delivering? Be specific.</text>

<rect x="0" y="30" width="540" height="52" rx="10" fill="#0F0F1A" stroke="#2A2A42" stroke-width="1"/>
<rect x="0" y="30" width="540" height="52" rx="10" fill="none" stroke="#00FFB2" stroke-width="1.5" opacity=".6"/>
<text x="20" y="62" class="t-primary" font-size="14">Full brand identity + 5-page marketing website</text>
<!-- Cursor blink -->
<rect x="365" y="48" width="2" height="18" fill="#00FFB2" class="pulse"/>
</g>

<!-- Field 2: Budget -->
<g transform="translate(0, 284)">
<text x="0" y="0" class="t-purple mono" font-size="11" letter-spacing="1">02</text>
<text x="30" y="0" class="t-primary" font-size="14" font-weight="500">Agreed Budget</text>
<text x="0" y="18" class="t-muted" font-size="11">What did you agree on during the call?</text>

<rect x="0" y="30" width="540" height="52" rx="10" fill="#0F0F1A" stroke="#2A2A42" stroke-width="1"/>
<text x="20" y="62" class="t-primary" font-size="14">$5,000</text>
</g>

<!-- Field 3: Timeline -->
<g transform="translate(0, 398)">
<text x="0" y="0" class="t-warm mono" font-size="11" letter-spacing="1">03</text>
<text x="30" y="0" class="t-primary" font-size="14" font-weight="500">Timeline</text>
<text x="0" y="18" class="t-muted" font-size="11">Start-to-finish delivery window.</text>

<rect x="0" y="30" width="540" height="52" rx="10" fill="#0F0F1A" stroke="#2A2A42" stroke-width="1"/>
<text x="20" y="62" class="t-primary" font-size="14">6 weeks — starting May 12</text>
</g>

<!-- Optional Notes -->
<g transform="translate(0, 498)">
<text x="0" y="0" class="t-muted mono" font-size="11" letter-spacing="1">OPTIONAL</text>
<text x="70" y="0" class="t-secondary" font-size="14">Extra Notes</text>

<rect x="0" y="18" width="540" height="72" rx="10" fill="#0F0F1A" stroke="#1E1E32" stroke-width="1"/>
<text x="20" y="44" class="t-muted" font-size="13">Client prefers modern minimalist style. Loves</text>
<text x="20" y="62" class="t-muted" font-size="13">Aesop and Kinfolk aesthetic. Needs by Q3.</text>
</g>

<!-- Submit Button -->
<rect x="0" y="614" width="540" height="56" rx="12" fill="url(#btn-g)" filter="url(#glow-lg)"/>
<text x="170" y="648" fill="#07070D" class="syne" font-size="16" font-weight="700">⚡ Generate Proposal</text>

<text x="120" y="694" class="t-muted" font-size="12">AI will write and send the proposal to Sarah's email</text>
</g>

<!-- ═══ RIGHT SIDE — PREVIEW ═══ -->
<g transform="translate(720, 100)">
<text x="0" y="30" class="syne t-primary" font-size="20" font-weight="700">Proposal Preview</text>
<text x="0" y="50" class="t-muted" font-size="12">AI-generated from your 3 fields + original inquiry context</text>

<!-- Preview card -->
<rect x="0" y="68" width="640" height="600" rx="16" fill="url(#card-g)" stroke="#2A2A42" stroke-width="1" filter="url(#shadow)"/>

<!-- Email header mock -->
<rect x="0" y="68" width="640" height="50" rx="16" fill="#0F0F1A"/>
<rect x="0" y="98" width="640" height="20" fill="#0F0F1A"/>
<circle cx="28" cy="93" r="6" fill="#FF6B6B" opacity=".6"/>
<circle cx="46" cy="93" r="6" fill="#FFC078" opacity=".6"/>
<circle cx="64" cy="93" r="6" fill="#00FFB2" opacity=".6"/>
<text x="90" y="97" class="mono t-muted" font-size="10">To: sarah@example.com</text>

<text x="28" y="140" class="t-muted mono" font-size="10">SUBJECT</text>
<text x="28" y="160" class="t-primary" font-size="14" font-weight="600">Your Brand Identity Proposal — Alex Design Studio</text>

<line x1="28" y1="176" x2="612" y2="176" stroke="#1E1E32"/>

<!-- Proposal body preview -->
<text x="28" y="200" class="t-secondary" font-size="12">Hi Sarah,</text>
<text x="28" y="224" class="t-secondary" font-size="12">It was great speaking with you! I'm thrilled about the</text>
<text x="28" y="242" class="t-secondary" font-size="12">direction we discussed for your rebrand. Here's what I'm</text>
<text x="28" y="260" class="t-secondary" font-size="12">proposing:</text>

<text x="28" y="290" class="syne t-primary" font-size="13" font-weight="700">Scope of Work</text>
<text x="28" y="312" class="t-secondary" font-size="12">→ Brand Strategy &amp; Mood Board (Week 1)</text>
<text x="28" y="330" class="t-secondary" font-size="12">→ Logo Design — 3 concepts, 2 revision rounds (Week 2-3)</text>
<text x="28" y="348" class="t-secondary" font-size="12">→ Brand Guidelines Document (Week 3)</text>
<text x="28" y="366" class="t-secondary" font-size="12">→ 5-Page Website Design &amp; Build (Week 4-5)</text>
<text x="28" y="384" class="t-secondary" font-size="12">→ Launch Support &amp; Handoff (Week 6)</text>

<text x="28" y="414" class="syne t-primary" font-size="13" font-weight="700">Investment</text>
<text x="28" y="436" class="t-accent" font-size="16" font-weight="600">$5,000</text>
<text x="100" y="436" class="t-muted" font-size="12">— 50% upfront, 50% at launch</text>

<text x="28" y="466" class="syne t-primary" font-size="13" font-weight="700">Timeline</text>
<text x="28" y="486" class="t-secondary" font-size="12">6 weeks — May 12 through June 23, 2026</text>

<line x1="28" y1="508" x2="612" y2="508" stroke="#1E1E32"/>

<text x="28" y="532" class="t-secondary" font-size="12">To move forward, simply reply "approved" and I'll send</text>
<text x="28" y="550" class="t-secondary" font-size="12">over the invoice for the first payment.</text>

<text x="28" y="580" class="t-secondary" font-size="12">Looking forward to building something beautiful together.</text>
<text x="28" y="604" class="t-secondary" font-size="12">— Alex</text>

<!-- "AI Generated" badge -->
<rect x="480" y="630" width="140" height="26" rx="13" fill="#00FFB2" opacity=".08" stroke="#00FFB2" stroke-width="1" stroke-opacity=".3"/>
<text x="498" y="648" class="t-accent mono" font-size="10">🧠 AI-Generated</text>

<!-- What happens next -->
<rect x="0" y="690" width="640" height="80" rx="12" fill="#0F0F1A" stroke="#1E1E32" stroke-width="1"/>
<text x="20" y="716" class="t-muted mono" font-size="10" letter-spacing="1">AFTER YOU HIT SEND</text>
<text x="20" y="738" class="t-secondary" font-size="12">📧 Proposal emailed → ⏰ Follow-up #1 in 48h → ⏰ #2 in 5d → 👤 Human review if ghosted</text>
<text x="20" y="756" class="t-accent" font-size="11">The system handles everything. Just show up when they say yes.</text>
</g>

<!-- Accent bottom line -->
<rect x="0" y="896" width="1440" height="4" fill="url(#accent-g)"/>
</svg>
