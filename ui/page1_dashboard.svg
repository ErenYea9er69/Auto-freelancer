<text x="66" y="230" class="mono t-purple" font-size="11">7</text>

<!-- Stage 3: Follow-up -->
<circle cx="44" cy="288" r="10" fill="#FFC078" stroke="#FFC078" stroke-width="2" fill-opacity=".2"/>
<text x="66" y="284" class="t-primary" font-size="13" font-weight="500">Follow-up</text>
<text x="66" y="300" class="mono t-warm" font-size="11">3</text>

<!-- Stage 4: Proposal -->
<circle cx="44" cy="358" r="10" fill="#1E1E32" stroke="#7A7A96" stroke-width="2"/>
<text x="66" y="354" class="t-primary" font-size="13" font-weight="500">Proposal Sent</text>
<text x="66" y="370" class="mono t-secondary" font-size="11">5</text>

<!-- Stage 5: Closing -->
<circle cx="44" cy="428" r="10" fill="#1E1E32" stroke="#7A7A96" stroke-width="2"/>
<text x="66" y="424" class="t-primary" font-size="13" font-weight="500">Closing</text>
<text x="66" y="440" class="mono t-secondary" font-size="11">2</text>

