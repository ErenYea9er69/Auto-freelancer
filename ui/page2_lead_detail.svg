<text x="68" y="56" class="t-muted" font-size="12">📄 AI Proposal → Proposal Follow-up #1 → Follow-up #2 → Human Review</text>
</g>

<g transform="translate(28, 596)" opacity=".3">
<circle cx="20" cy="20" r="12" fill="#1E1E32" stroke="#44445A" stroke-width="1"/>
<text x="48" y="16" class="t-muted mono" font-size="10">AFTER SIGNING</text>
<rect x="48" y="26" width="830" height="48" rx="10" fill="#0F0F1A" stroke="#1E1E32" stroke-width="1"/>
