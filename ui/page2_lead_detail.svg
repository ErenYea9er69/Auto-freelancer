<g transform="translate(28, 520)" opacity=".4">
<circle cx="20" cy="20" r="12" fill="#1E1E32" stroke="#44445A" stroke-width="1"/>
<text x="48" y="16" class="t-muted mono" font-size="10">AFTER CALL</text>
