<text x="24" y="158" class="t-primary" font-size="13">Complete rebrand — logo, website, brand guidelines</text>

<text x="24" y="188" class="t-muted mono" font-size="10" letter-spacing="1">BUDGET</text>
<text x="24" y="206" class="t-primary" font-size="14" font-weight="500">$5,000</text>

<text x="200" y="188" class="t-muted mono" font-size="10" letter-spacing="1">TIMELINE</text>
<text x="200" y="206" class="t-primary" font-size="14" font-weight="500">6 weeks</text>

<text x="24" y="236" class="t-muted mono" font-size="10" letter-spacing="1">SOURCE</text>
<text x="24" y="254" class="t-primary" font-size="13">Instagram DM → Website form</text>

<text x="200" y="236" class="t-muted mono" font-size="10" letter-spacing="1">RECEIVED</text>
<text x="200" y="254" class="t-primary" font-size="13">May 6, 2026 · 4:23 PM</text>
</g>

<!-- AI Qualification Card -->
<g transform="translate(40, 388)">
<rect width="400" height="180" rx="16" fill="url(#card-g)" stroke="#2A2A42" stroke-width="1" filter="url(#shadow)"/>
<rect x="20" y="16" width="28" height="28" rx="6" fill="#00FFB2" opacity=".1"/>
<text x="27" y="36" font-size="14">🧠</text>
