<text x="24" y="68" class="t-muted mono" font-size="10" letter-spacing="1">REASONING</text>
<text x="24" y="88" class="t-secondary" font-size="12">Clear project scope (rebrand), explicit budget ($5k),</text>
<text x="24" y="104" class="t-secondary" font-size="12">defined timeline (6 weeks), has existing brand to</text>
