<text x="120" y="84" class="t-primary" font-size="12" font-weight="500">Excited about your rebrand project, Sarah!</text>

<text x="68" y="112" class="t-secondary" font-size="12" xml:space="preserve">Hi Sarah,</text>
<text x="68" y="132" class="t-secondary" font-size="12">Thanks for reaching out about your rebrand! A complete identity</text>
<text x="68" y="148" class="t-secondary" font-size="12">overhaul — logo, website, and guidelines — is exactly the kind of</text>
<text x="68" y="164" class="t-secondary" font-size="12">project I love diving into. Six weeks is a comfortable runway for</text>
<text x="68" y="180" class="t-secondary" font-size="12">something this comprehensive.</text>

<text x="68" y="204" class="t-secondary" font-size="12">I'd love to hear more about what's driving the rebrand. Let's hop</text>
<text x="68" y="220" class="t-secondary" font-size="12">on a quick call: </text>
<text x="188" y="220" class="t-accent" font-size="12" text-decoration="underline">calendly.com/alex-studio/30min</text>
<text x="68" y="240" class="t-secondary" font-size="12">— Alex</text>
