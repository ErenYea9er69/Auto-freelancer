<rect x="48" y="26" width="830" height="72" rx="10" fill="#0F0F1A" stroke="#1E1E32" stroke-width="1" stroke-dasharray="4,4" opacity=".6"/>
<text x="68" y="52" class="t-muted mono" font-size="11" font-weight="500">FOLLOW-UP #2 (FINAL)</text>
<text x="68" y="76" class="t-muted" font-size="12">Warm last touch. No pressure. Then flags for human review.</text>
