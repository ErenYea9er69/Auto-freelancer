<line x1="302" y1="16" x2="340" y2="16" stroke="#2A2A42" stroke-width="2" stroke-dasharray="4,4"/>

<circle cx="350" cy="16" r="10" fill="#1E1E32" stroke="#2A2A42" stroke-width="2"/>
