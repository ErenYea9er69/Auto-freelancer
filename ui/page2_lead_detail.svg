<text x="20" y="30" class="t-accent" font-size="13" font-weight="500">📅 Mark Call Booked</text>

<rect x="212" y="0" width="192" height="48" rx="10" fill="#6C5CE7" opacity=".1" stroke="#6C5CE7" stroke-width="1" stroke-opacity=".4"/>
<text x="232" y="30" class="t-purple" font-size="13" font-weight="500">📝 Submit Post-Call</text>

<rect x="424" y="0" width="192" height="48" rx="10" fill="#1E1E32" stroke="#2A2A42" stroke-width="1"/>
<text x="444" y="30" class="t-secondary" font-size="13" font-weight="500">🗄️ Archive Lead</text>
